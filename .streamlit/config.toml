[server]
headless = true
port = 8501
# If busy: streamlit run dashboard_app.py --server.port 8511
# Fix macOS "Cannot start fsevents stream" watcher crash by using polling.
fileWatcherType = "poll"

[browser]
gatherUsageStats = false

[theme]
base = "dark"
backgroundColor = "#05070f"
secondaryBackgroundColor = "#080a14"
textColor = "#e8f2ff"
font = "monospace"